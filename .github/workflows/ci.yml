name: System Integrity & Security Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Environment
        run: |
          cp .env.example .env
          # Use placeholder values for CI
          sed -i 's/YOUR_ANON_KEY_HERE/ci-anon-key/g' .env
          sed -i 's|https://your-project-id.supabase.co|https://test.supabase.co|g' .env

      - name: Run Integrity Checks
        run: |
          chmod +x tests/system_integrity_check.sh
          ./tests/system_integrity_check.sh

      - name: Run Privacy Boundary Smoke Test
        run: |
          chmod +x tests/privacy_boundary_test.sh
          ./tests/privacy_boundary_test.sh

      - name: Verify TOTP Encryption Configuration
        run: |
          echo "Checking TOTP encryption setup..."
          
          # Check that migration uses encrypted column (not plaintext 'text')
          if grep -q "secret text" supabase/migrations/012_totp_secrets.sql; then
            echo "❌ FAIL: TOTP secrets stored as plaintext 'text' type"
            exit 1
          fi
          
          # Check for encrypted column type
          if grep -q "secret_encrypted bytea" supabase/migrations/012_totp_secrets.sql; then
            echo "✅ TOTP uses encrypted bytea storage"
          else
            echo "❌ FAIL: TOTP migration missing secret_encrypted column"
            exit 1
          fi
          
          # Check for encryption functions
          if grep -q "pgp_sym_encrypt" supabase/migrations/012_totp_secrets.sql; then
            echo "✅ TOTP uses pgp_sym_encrypt"
          else
            echo "❌ FAIL: TOTP missing encryption function calls"
            exit 1
          fi
          
          # Check for decryption functions
          if grep -q "pgp_sym_decrypt" supabase/migrations/012_totp_secrets.sql; then
            echo "✅ TOTP uses pgp_sym_decrypt"
          else
            echo "❌ FAIL: TOTP missing decryption function calls"
            exit 1
          fi
          
          echo "TOTP encryption verification complete"

      - name: Verify Role Constraint Consistency
        run: |
          echo "Checking role constraint consistency..."
          
          # Check that 'partner' is in the constraint in BOTH files
          if ! grep -q "'partner'" supabase/migrations/001_ops_tables.sql; then
            echo "❌ FAIL: 'partner' role missing from 001_ops_tables.sql"
            exit 1
          fi
          
          if ! grep -q "'partner'" supabase/migrations/006_presidency_oversight.sql; then
            echo "❌ FAIL: 'partner' role missing from 006_presidency_oversight.sql constraint"
            exit 1
          fi
          
          echo "✅ Role constraint includes 'partner' in all migrations"
