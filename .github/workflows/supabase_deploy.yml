name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"
      - ".github/workflows/supabase_deploy.yml"
  workflow_dispatch:

# Least-privilege: only allow writing to deployments
permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production   # Requires manual approval in GitHub → Settings → Environments

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Resolve project ref
        id: resolve
        run: |
          PROJECT_ID="${{ secrets.SUPABASE_PROJECT_ID }}"
          if [ -z "$PROJECT_ID" ]; then
            PROJECT_ID="${{ secrets.SUPABASE_PROJECT_REF }}"
          fi
          if [ -z "$PROJECT_ID" ]; then
            echo "::error::SUPABASE_PROJECT_ID secret is not set. Aborting deployment."
            exit 1
          fi
          echo "project_id=$PROJECT_ID" >> "$GITHUB_OUTPUT"

      # ── PUBLIC-FACING (no JWT required) ─────────────────────
      - name: Deploy paws-chat
        run: supabase functions deploy paws-chat --project-ref "${{ steps.resolve.outputs.project_id }}" --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy paws-intake
        run: supabase functions deploy paws-intake --project-ref "${{ steps.resolve.outputs.project_id }}" --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # ── PRIVILEGED (JWT required) ────────────────────────────
      - name: Deploy paws-2fa-verify
        run: supabase functions deploy paws-2fa-verify --project-ref "${{ steps.resolve.outputs.project_id }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy paws-secure-action
        run: supabase functions deploy paws-secure-action --project-ref "${{ steps.resolve.outputs.project_id }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy paws-council
        run: supabase functions deploy paws-council --project-ref "${{ steps.resolve.outputs.project_id }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
