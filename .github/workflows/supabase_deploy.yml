name: Deploy Supabase Functions

on:
  push:
    branches:
      - main
    paths:
      - "supabase/functions/**"
      - ".github/workflows/supabase_deploy.yml"
  workflow_dispatch:

# Least-privilege: only allow reading to deployments
permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Resolve Project ID
        id: resolve
        run: |
          # Use project id from config or env
          PROJECT_ID=$(grep "project_id" supabase/config.toml | cut -d '"' -f 2 || echo "operation-paws-pilot")
          echo "project_id=$PROJECT_ID" >> $GITHUB_OUTPUT

      # ── PUBLIC-FACING (no JWT required) ─────────────────────
      - name: Deploy paws-chat
        run: |
          supabase functions deploy paws-chat \
            --project-ref "${{ steps.resolve.outputs.project_id }}" \
            --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # ── PRIVILEGED (JWT required - Default) ──────────────────
      - name: Deploy paws-intake
        run: |
          supabase functions deploy paws-intake \
            --project-ref "${{ steps.resolve.outputs.project_id }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy paws-2fa-verify
        run: |
          supabase functions deploy paws-2fa-verify \
            --project-ref "${{ steps.resolve.outputs.project_id }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy paws-secure-action
        run: |
          supabase functions deploy paws-secure-action \
            --project-ref "${{ steps.resolve.outputs.project_id }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy paws-council
        run: |
          supabase functions deploy paws-council \
            --project-ref "${{ steps.resolve.outputs.project_id }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
