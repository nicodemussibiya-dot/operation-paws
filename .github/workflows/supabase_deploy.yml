name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"
      - ".github/workflows/supabase_deploy.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy paws-chat
        run: |
          # Use either SUPABASE_PROJECT_ID or SUPABASE_PROJECT_REF to be safe
          PROJECT_ID="${{ secrets.SUPABASE_PROJECT_ID }}"
          if [ -z "$PROJECT_ID" ]; then
            PROJECT_ID="${{ secrets.SUPABASE_PROJECT_REF }}"
          fi
          
          if [ -z "$PROJECT_ID" ]; then
            echo "Error: SUPABASE_PROJECT_ID secret is missing in GitHub Actions."
            exit 1
          fi
          
          supabase functions deploy paws-chat --project-ref "$PROJECT_ID" --no-verify-jwt
          supabase functions deploy paws-intake --project-ref "$PROJECT_ID" --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
