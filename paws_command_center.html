<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PAWS Command Center</title>
    <style>
        :root {
            --bg-color: #05070a;
            --accent-color: #00d2ff;
            --accent-glow: rgba(0, 210, 255, 0.35);
            --glass-bg: rgba(15, 20, 30, 0.72);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #e0e6ed;
            --text-dim: #94a3b8;
            --warning-bg: #ffcc00;
            --warning-text: #111827;
            --danger-bg: rgba(255, 90, 90, 0.18);
            --danger-border: rgba(255, 90, 90, 0.28);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        html,
        body {
            min-height: 100%;
        }

        body {
            background:
                radial-gradient(circle at top, rgba(0, 210, 255, 0.08), transparent 35%),
                linear-gradient(rgba(5, 7, 10, 0.55), rgba(5, 7, 10, 0.72)),
                var(--bg-color);
            background-image:
                radial-gradient(circle at top, rgba(0, 210, 255, 0.08), transparent 35%),
                linear-gradient(rgba(5, 7, 10, 0.55), rgba(5, 7, 10, 0.72)),
                url('command_center_bg_1777147023307.png');
            background-size: cover;
            background-position: center;
            color: var(--text-main);
            overflow: hidden;
        }

        .page-shell {
            min-height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 16px;
        }

        .notice-banner {
            width: min(1100px, 90vw);
            background: var(--warning-bg);
            color: var(--warning-text);
            padding: 12px 16px;
            border-radius: 14px;
            text-align: center;
            font-weight: 800;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
        }

        .container {
            width: min(1100px, 90vw);
            height: min(85vh, 900px);
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
            overflow: hidden;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(18px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        header {
            padding: 24px 28px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand .logo {
            width: 32px;
            height: 32px;
            background: var(--accent-color);
            border-radius: 8px;
            box-shadow: 0 0 20px var(--accent-glow);
            flex: 0 0 auto;
        }

        .brand h1 {
            font-size: 18px;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #fff;
        }

        .role-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            background: rgba(0, 0, 0, 0.28);
            padding: 6px;
            border-radius: 14px;
            border: 1px solid var(--glass-border);
        }

        .role-btn {
            padding: 8px 14px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-dim);
            transition: all 0.2s ease;
            border: none;
            background: transparent;
        }

        .role-btn:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.05);
        }

        .role-btn.active {
            background: var(--accent-color);
            color: #000;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.35);
        }

        .chat-container {
            flex: 1;
            min-height: 0;
            padding: 28px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 18px;
            scrollbar-width: thin;
            scrollbar-color: var(--glass-border) transparent;
        }

        .message {
            max-width: min(82%, 760px);
            padding: 16px 18px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.65;
            animation: msgSlide 0.25s ease-out;
            word-break: break-word;
        }

        @keyframes msgSlide {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.system {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
        }

        .message.user {
            align-self: flex-end;
            background: var(--accent-color);
            color: #000;
            font-weight: 600;
        }

        .message.error {
            border: 1px solid var(--danger-border);
            background: var(--danger-bg);
        }

        .status-badge {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            display: block;
            opacity: 0.7;
            font-weight: 800;
        }

        footer {
            padding: 20px 28px 24px;
            background: rgba(0, 0, 0, 0.18);
            border-top: 1px solid var(--glass-border);
        }

        .input-group {
            display: flex;
            gap: 12px;
            background: rgba(255, 255, 255, 0.03);
            padding: 8px 8px 8px 18px;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
        }

        input {
            flex: 1;
            min-width: 0;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 15px;
            outline: none;
        }

        input::placeholder {
            color: var(--text-dim);
        }

        .send-btn {
            background: var(--accent-color);
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            transition: transform 0.2s ease, opacity 0.2s ease;
            white-space: nowrap;
        }

        .send-btn:hover:not(:disabled) {
            transform: scale(1.02);
        }

        .send-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .loading {
            display: flex;
            gap: 4px;
            padding: 10px;
            align-items: center;
        }

        .dot {
            width: 6px;
            height: 6px;
            background: var(--accent-color);
            border-radius: 50%;
            animation: blink 1.4s infinite both;
        }

        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes blink {
            0%, 80%, 100% { opacity: 0; }
            40% { opacity: 1; }
        }

        @media (max-width: 900px) {
            body {
                overflow: auto;
            }

            .page-shell {
                justify-content: flex-start;
            }

            .container {
                height: min(84vh, 960px);
            }

            header,
            .chat-container,
            footer {
                padding-left: 18px;
                padding-right: 18px;
            }

            .message {
                max-width: 92%;
            }
        }

        @media (max-width: 640px) {
            .notice-banner,
            .container {
                width: 100%;
            }

            .page-shell {
                padding: 10px;
            }

            .brand h1 {
                font-size: 16px;
            }

            .input-group {
                padding-left: 14px;
            }

            .send-btn {
                padding: 10px 16px;
            }
        }
    </style>
</head>
<body>
    <div class="page-shell">
        <div class="notice-banner">
            NOTICE: This is a proposal / pilot / demo prototype reference architecture. It is NOT operational until formally adopted.
        </div>

        <div class="container">
            <header>
                <div class="brand">
                    <div class="logo"></div>
                    <h1>PAWS Command Center</h1>
                </div>

                <div class="role-selector" id="roleSelector">
                    <button class="role-btn" data-role="clerk">Clerk</button>
                    <button class="role-btn" data-role="officer">Officer</button>
                    <button class="role-btn" data-role="command">Command</button>
                    <button class="role-btn active" data-role="presidency">Presidency</button>
                    <button class="role-btn" data-role="citizen">Citizen</button>
                </div>
            </header>

            <div class="chat-container" id="chat"></div>

            <footer>
                <div class="input-group">
                    <input
                        type="text"
                        id="userInput"
                        placeholder="Query the system..."
                        autocomplete="off"
                    />
                    <button class="send-btn" id="sendBtn">Send</button>
                </div>
            </footer>
        </div>
    </div>

    <script>
        const GATEWAY_URL = 'http://localhost:9999';

        const chat = document.getElementById('chat');
        const input = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const roleSelector = document.getElementById('roleSelector');

        let currentRole = 'presidency';
        let chatHistory = [];
        let isSending = false;

        const roles = {
            clerk: {
                name: "Governance Clerk",
                badge: "Governance Active",
                intro: "Welcome to the National K9 Command Center. You are currently logged in with **Governance Clerk** credentials. I can help you with policy flow, records alignment, and guardrail checks."
            },
            officer: {
                name: "Field Officer",
                badge: "Field Ops Active",
                intro: "Welcome to the National K9 Command Center. You are currently logged in with **Field Officer** credentials. I can help you with operational procedures, readiness, and field guidance."
            },
            command: {
                name: "Command Authority",
                badge: "Portfolio Active",
                intro: "Welcome to the National K9 Command Center. You are currently logged in with **Command Authority** credentials. I can help you with deployment readiness, command priorities, and strategic decisions."
            },
            presidency: {
                name: "Presidency Oversight",
                badge: "Strategic Oversight",
                intro: "Welcome to the National K9 Command Center. You are currently logged in with **Presidency Oversight** credentials. How can I assist you with national risk and stability metrics?"
            },
            citizen: {
                name: "Citizen Explainer",
                badge: "Public Transparency",
                intro: "Welcome to the National K9 Command Center. You are currently logged in with **Citizen Explainer** credentials. I can help translate the system into clear public-facing language."
            }
        };

        function escapeHtml(text) {
            return String(text ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function formatMessageText(text) {
            return escapeHtml(text)
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n/g, '<br>');
        }

        function clearChat() {
            chat.innerHTML = '';
        }

        function addMessage(type, text, badge = "", extraClass = "") {
            const div = document.createElement('div');
            div.className = `message ${type} ${extraClass}`.trim();
            div.innerHTML =
                (badge ? `<span class="status-badge">${escapeHtml(badge)}</span>` : "") +
                formatMessageText(text);

            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            return div;
        }

        function addLoading() {
            const id = 'loading-' + Date.now();
            const div = document.createElement('div');
            div.id = id;
            div.className = 'message system loading';
            div.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            return id;
        }

        function removeLoading(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }

        function setBusyState(busy) {
            isSending = busy;
            sendBtn.disabled = busy;
            input.disabled = busy;
        }

        function renderIntro(roleKey) {
            clearChat();
            addMessage('system', roles[roleKey].intro, 'System Initialization');
            input.focus();
        }

        roleSelector.addEventListener('click', (e) => {
            if (!e.target.classList.contains('role-btn')) return;

            document.querySelectorAll('.role-btn').forEach((btn) => btn.classList.remove('active'));
            e.target.classList.add('active');

            currentRole = e.target.dataset.role;
            chatHistory = [];

            renderIntro(currentRole);
            addMessage(
                'system',
                `Role switched to **${roles[currentRole].name}**. Context and guardrails updated.`,
                roles[currentRole].badge
            );
        });

        async function handleSend() {
            const text = input.value.trim();
            if (!text || isSending) return;

            addMessage('user', text);
            chatHistory.push({ role: 'user', content: text });
            input.value = '';

            setBusyState(true);
            const loadingId = addLoading();

            try {
                const res = await fetch(GATEWAY_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        role: currentRole,
                        messages: chatHistory
                    })
                });

                let data;
                try {
                    data = await res.json();
                } catch {
                    data = { error: `Gateway returned a non-JSON response (HTTP ${res.status}).` };
                }

                removeLoading(loadingId);

                if (data.reply) {
                    addMessage('system', data.reply, roles[currentRole].badge);
                    chatHistory.push({ role: 'assistant', content: data.reply });
                } else if (data.error) {
                    addMessage(
                        'system',
                        `**Gateway Error:** ${data.error}`,
                        'System Error',
                        'error'
                    );
                } else {
                    addMessage(
                        'system',
                        '**Gateway Error:** The gateway returned an empty response.',
                        'System Error',
                        'error'
                    );
                }
            } catch (err) {
                removeLoading(loadingId);
                addMessage(
                    'system',
                    `The PAWS AI Gateway is not reachable at **${GATEWAY_URL}**. Ensure you have run **deno run -A demo_gateway.ts** in your terminal.`,
                    'Connection Offline',
                    'error'
                );
            } finally {
                setBusyState(false);
                input.focus();
            }
        }

        sendBtn.addEventListener('click', handleSend);
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSend();
        });

        renderIntro(currentRole);
    </script>
</body>
</html>
