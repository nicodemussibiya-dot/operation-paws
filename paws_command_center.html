<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PAWS Command Center</title>
  <style>
    :root {
      --bg-color:       #05070a;
      --accent-color:   #00d2ff;
      --accent-glow:    rgba(0,210,255,0.35);
      --glass-bg:       rgba(15,20,30,0.82);
      --glass-border:   rgba(255,255,255,0.10);
      --text-main:      #e0e6ed;
      --text-dim:       #94a3b8;
      --warning-bg:     #ffcc00;
      --warning-text:   #111827;
      --danger-bg:      rgba(255,90,90,0.15);
      --danger-border:  rgba(255,90,90,0.30);
      --retry-bg:       rgba(0,210,255,0.12);
      --retry-border:   rgba(0,210,255,0.35);
    }

    * { margin:0; padding:0; box-sizing:border-box;
        font-family: Inter, system-ui, -apple-system, "Segoe UI", sans-serif; }

    html, body { min-height:100%; }

    body {
      background:
        radial-gradient(circle at top, rgba(0,210,255,0.08), transparent 35%),
        linear-gradient(rgba(5,7,10,0.55), rgba(5,7,10,0.72)),
        var(--bg-color);
      color: var(--text-main);
      overflow: hidden;
    }

    .page-shell {
      min-height: 100vh; width: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 12px; padding: 16px;
    }

    /* ── Notice banner ── */
    .notice-banner {
      width: min(1100px, 90vw);
      background: var(--warning-bg); color: var(--warning-text);
      padding: 10px 16px; border-radius: 14px;
      text-align: center; font-weight: 800; font-size: 13px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    /* ── Main container ── */
    .container {
      width: min(1100px, 90vw); height: min(85vh, 900px);
      background: var(--glass-bg);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border); border-radius: 24px;
      display: flex; flex-direction: column;
      box-shadow: 0 40px 100px rgba(0,0,0,0.5);
      animation: fadeIn 0.8s ease-out; overflow: hidden;
    }

    @keyframes fadeIn {
      from { opacity:0; transform:translateY(18px); }
      to   { opacity:1; transform:translateY(0);    }
    }

    /* ── Header ── */
    header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--glass-border);
      display: flex; justify-content: space-between; align-items: center;
      gap: 16px; flex-wrap: wrap;
    }

    .brand { display:flex; align-items:center; gap:12px; }
    .brand .logo {
      width:30px; height:30px;
      background: var(--accent-color); border-radius:8px;
      box-shadow: 0 0 20px var(--accent-glow); flex: 0 0 auto;
    }
    .brand h1 {
      font-size:17px; font-weight:800;
      letter-spacing:1px; text-transform:uppercase; color:#fff;
    }

    /* ── Role selector ── */
    .role-selector {
      display:flex; flex-wrap:wrap; gap:5px;
      background: rgba(0,0,0,0.28); padding:5px;
      border-radius:14px; border:1px solid var(--glass-border);
    }
    .role-btn {
      padding:7px 12px; border-radius:9px; cursor:pointer;
      font-size:11px; font-weight:700; color:var(--text-dim);
      transition:all 0.2s ease; border:none; background:transparent;
    }
    .role-btn:hover { color:#fff; background:rgba(255,255,255,0.07); }
    .role-btn.active {
      background: var(--accent-color); color:#000;
      box-shadow: 0 0 14px var(--accent-glow);
    }

    /* ── Chat body ── */
    .chat-body {
      flex:1; overflow-y:auto; padding:20px 24px;
      display:flex; flex-direction:column; gap:14px;
      scroll-behavior:smooth;
    }
    .chat-body::-webkit-scrollbar { width:6px; }
    .chat-body::-webkit-scrollbar-track { background:transparent; }
    .chat-body::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.12); border-radius:3px; }

    /* ── Message bubbles ── */
    .msg { display:flex; gap:12px; max-width:82%; animation:msgIn 0.25s ease-out; }
    @keyframes msgIn {
      from { opacity:0; transform:translateY(8px); }
      to   { opacity:1; transform:translateY(0);   }
    }

    .msg.user-msg   { align-self:flex-end; flex-direction:row-reverse; }
    .msg.system-msg { align-self:flex-start; }

    .avatar {
      width:34px; height:34px; border-radius:10px; flex:0 0 auto;
      display:flex; align-items:center; justify-content:center;
      font-size:14px; font-weight:800;
    }
    .user-msg  .avatar { background: rgba(0,210,255,0.18); color:var(--accent-color); border:1px solid var(--accent-color); }
    .system-msg .avatar{ background: rgba(255,255,255,0.08); color:#fff; border:1px solid var(--glass-border); }

    .bubble {
      padding:12px 16px; border-radius:16px; font-size:14px;
      line-height:1.65; max-width:100%;
    }
    .user-msg  .bubble {
      background: rgba(0,210,255,0.13); border:1px solid rgba(0,210,255,0.22);
      border-top-right-radius:4px;
    }
    .system-msg .bubble {
      background: rgba(255,255,255,0.05); border:1px solid var(--glass-border);
      border-top-left-radius:4px;
    }

    .msg-badge {
      font-size:10px; font-weight:700; letter-spacing:0.6px;
      text-transform:uppercase; color:var(--text-dim);
      margin-bottom:5px;
    }

    /* ── Error bubble ── */
    .bubble.error-bubble {
      background: var(--danger-bg); border-color: var(--danger-border);
    }
    .bubble.error-bubble .error-label {
      color:#ff7a7a; font-weight:700; margin-bottom:6px; font-size:12px;
    }

    /* ── Retry button inside error bubble ── */
    .retry-btn {
      margin-top:10px; padding:7px 14px;
      background: var(--retry-bg); border:1px solid var(--retry-border);
      color: var(--accent-color); border-radius:8px;
      font-size:12px; font-weight:700; cursor:pointer;
      transition:all 0.2s ease;
    }
    .retry-btn:hover { background:rgba(0,210,255,0.22); }

    /* ── Loading indicator ── */
    .loading-bubble {
      display:flex; gap:5px; padding:14px 16px;
      background: rgba(255,255,255,0.05); border:1px solid var(--glass-border);
      border-radius:16px; border-top-left-radius:4px;
      align-items:center;
    }
    .dot {
      width:7px; height:7px; border-radius:50%;
      background:var(--accent-color);
      animation:bounce 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay:.2s; }
    .dot:nth-child(3) { animation-delay:.4s; }
    @keyframes bounce {
      0%,80%,100% { transform:scale(0.7); opacity:0.4; }
      40%          { transform:scale(1.1); opacity:1;   }
    }

    /* ── Input bar ── */
    .input-bar {
      padding:16px 20px;
      border-top:1px solid var(--glass-border);
      display:flex; gap:10px; align-items:flex-end;
    }
    .input-bar textarea {
      flex:1; background:rgba(255,255,255,0.07);
      border:1px solid var(--glass-border); border-radius:14px;
      color:var(--text-main); font-size:14px;
      padding:12px 16px; resize:none; outline:none;
      line-height:1.5; max-height:120px;
      transition:border-color 0.2s;
    }
    .input-bar textarea:focus { border-color:var(--accent-color); }
    .input-bar textarea::placeholder { color:var(--text-dim); }

    #sendBtn {
      padding:12px 20px; border-radius:14px;
      background:var(--accent-color); color:#000;
      font-weight:800; font-size:13px; border:none; cursor:pointer;
      box-shadow:0 0 20px var(--accent-glow);
      transition:all 0.2s ease; white-space:nowrap;
    }
    #sendBtn:hover:not(:disabled) { filter:brightness(1.1); }
    #sendBtn:disabled { opacity:0.5; cursor:not-allowed; }

    /* ── Status bar ── */
    .status-bar {
      font-size:11px; color:var(--text-dim); text-align:center;
      padding:4px 0 8px; letter-spacing:0.4px;
    }
    .status-bar .dot-live {
      display:inline-block; width:7px; height:7px; border-radius:50%;
      background:#22c55e; margin-right:5px;
      box-shadow:0 0 8px #22c55e;
      animation:pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity:1; } 50% { opacity:0.4; }
    }
    .status-bar .dot-offline {
      display:inline-block; width:7px; height:7px; border-radius:50%;
      background:#ef4444; margin-right:5px;
    }
  </style>
</head>
<body>
<div class="page-shell">

  <div class="notice-banner">
    ⚠️ NOTICE: This is a proposal / pilot / demo prototype reference architecture.
    It is NOT operational until formally adopted.
  </div>

  <div class="container">
    <header>
      <div class="brand">
        <div class="logo"></div>
        <h1>🐾 PAWS Command Center</h1>
      </div>
      <div class="role-selector" id="roleSelector"></div>
    </header>

    <div class="chat-body" id="chatBody"></div>

    <div class="status-bar" id="statusBar">
      <span class="dot-live"></span> Gateway: <span id="gatewayStatus">Connecting to PAWS-Cloud…</span>
    </div>

    <div class="input-bar">
      <textarea id="chatInput" rows="1" placeholder="Ask PAWS-OS anything…"
                maxlength="2000"></textarea>
      <button id="sendBtn">Send ↑</button>
    </div>
  </div>

</div>

<script>
// ═══════════════════════════════════════════════════════════════════════════════
//  PAWS Command Center — Client v2.1
//  Fix: graceful 503 handling, client-side retry, "Try Again" UX
// ═══════════════════════════════════════════════════════════════════════════════

const GATEWAY_URL      = "https://dorihyvbgbhsxvdrtqqr.supabase.co/functions/v1/paws-chat";
const CLIENT_MAX_TRIES = 2;   // additional client-side retries before showing error
const CLIENT_DELAY_MS  = 900; // ms between client retries

const roles = {
  citizen:      { label:"Citizen",      badge:"Public Transparency", avatar:"👤" },
  officer:      { label:"Officer",      badge:"Field Operations",    avatar:"🐕" },
  command:      { label:"Command",      badge:"Command Authority",   avatar:"🎖️" },
  commissioner: { label:"Commissioner", badge:"National Commissioner", avatar:"⚖️" },
  breeder:      { label:"Breeder",      badge:"Breeder League",      avatar:"🐾" },
  legal:        { label:"Legal",        badge:"Legal Partner",       avatar:"📋" },
  logistics:    { label:"Logistics",    badge:"Logistics Partner",   avatar:"🚛" },
  church:       { label:"Community",    badge:"Community Leader",    avatar:"🤝" },
  media:        { label:"Media",        badge:"Media",               avatar:"📡" },
};

const intros = {
  citizen:      "Welcome to the National K9 Command Center. You are currently logged in with <strong>Citizen Explainer</strong> credentials. I can help translate the system into clear public-facing language.",
  officer:      "Officer portal active. Ready to assist with handler assignments, deployment checks, and welfare protocols.",
  command:      "Command dashboard online. Operational status, resource allocation, and deployment readiness are available.",
  commissioner: "Commissioner view active. Strategic oversight, key metrics, and governance status are at your disposal.",
  breeder:      "Breeder League portal. I can walk you through welfare standards, assessment criteria, and advancement pathways.",
  legal:        "Legal Partner interface. I'll be thorough and precise — flag anything requiring official verification.",
  logistics:    "Logistics interface active. Focus on traceability, movement records, and verification steps.",
  church:       "Community Leader portal. Let's explore how PAWS serves the community with integrity and ethical stewardship.",
  media:        "Media portal active. I'll keep things clear and jargon-free — feel free to ask me to go deeper on anything.",
};

// ─── State ────────────────────────────────────────────────────────────────────
let currentRole  = "citizen";
let chatHistory  = [];
let isSending    = false;
let lastUserText = null;   // kept for "Try Again"

// ─── DOM refs ─────────────────────────────────────────────────────────────────
const chatBody       = document.getElementById("chatBody");
const input          = document.getElementById("chatInput");
const sendBtn        = document.getElementById("sendBtn");
const roleSelector   = document.getElementById("roleSelector");
const gatewayStatus  = document.getElementById("gatewayStatus");
const statusBar      = document.getElementById("statusBar");

// ─── Build role buttons ────────────────────────────────────────────────────────
Object.entries(roles).forEach(([key, r]) => {
  const btn = document.createElement("button");
  btn.className = "role-btn" + (key === currentRole ? " active" : "");
  btn.textContent = r.label;
  btn.dataset.role = key;
  btn.addEventListener("click", () => switchRole(key));
  roleSelector.appendChild(btn);
});

function switchRole(role) {
  currentRole = role;
  chatHistory = [];
  document.querySelectorAll(".role-btn").forEach(b =>
    b.classList.toggle("active", b.dataset.role === role));
  chatBody.innerHTML = "";
  renderIntro(role);
}

// ─── Render intro message ──────────────────────────────────────────────────────
function renderIntro(role) {
  addMessage("system", intros[role] ?? intros.citizen, roles[role].badge);
}

// ─── Add a chat message ────────────────────────────────────────────────────────
let msgCounter = 0;

function addMessage(type, text, badge = "", variant = "") {
  const id  = `msg-${++msgCounter}`;
  const r   = roles[currentRole];
  const div = document.createElement("div");
  div.id        = id;
  div.className = `msg ${type === "user" ? "user-msg" : "system-msg"}`;

  const avatar = document.createElement("div");
  avatar.className = "avatar";
  avatar.textContent = type === "user" ? "U" : r.avatar;

  const right = document.createElement("div");

  if (badge) {
    const badgeEl = document.createElement("div");
    badgeEl.className   = "msg-badge";
    badgeEl.textContent = badge;
    right.appendChild(badgeEl);
  }

  const bubble = document.createElement("div");
  bubble.className = "bubble" + (variant === "error" ? " error-bubble" : "");

  if (variant === "error") {
    const label = document.createElement("div");
    label.className   = "error-label";
    label.textContent = "⚠ System Notice";
    bubble.appendChild(label);
  }

  const content = document.createElement("div");
  content.innerHTML = parseMarkdown(text);
  bubble.appendChild(content);

  // Add "Try Again" button for error messages when there's a pending user msg
  if (variant === "error" && lastUserText) {
    const retryBtn = document.createElement("button");
    retryBtn.className   = "retry-btn";
    retryBtn.textContent = "⟳ Try Again";
    retryBtn.addEventListener("click", () => {
      const txt = lastUserText;
      // Remove the error bubble
      div.remove();
      // Re-send
      dispatchMessage(txt);
    });
    bubble.appendChild(retryBtn);
  }

  right.appendChild(bubble);
  div.appendChild(avatar);
  div.appendChild(right);
  chatBody.appendChild(div);
  chatBody.scrollTop = chatBody.scrollHeight;
  return id;
}

// ─── Loading indicator ─────────────────────────────────────────────────────────
function addLoading() {
  const id  = `loading-${++msgCounter}`;
  const div = document.createElement("div");
  div.id = id; div.className = "msg system-msg";

  const avatar = document.createElement("div");
  avatar.className   = "avatar";
  avatar.textContent = roles[currentRole].avatar;

  const bubble = document.createElement("div");
  bubble.className = "loading-bubble";
  [1,2,3].forEach(() => {
    const d = document.createElement("div"); d.className = "dot";
    bubble.appendChild(d);
  });

  div.appendChild(avatar); div.appendChild(bubble);
  chatBody.appendChild(div);
  chatBody.scrollTop = chatBody.scrollHeight;
  return id;
}

function removeLoading(id) {
  document.getElementById(id)?.remove();
}

// ─── Busy state ────────────────────────────────────────────────────────────────
function setBusyState(busy) {
  isSending      = busy;
  sendBtn.disabled = busy;
  input.disabled   = busy;
  sendBtn.textContent = busy ? "…" : "Send ↑";
}

// ─── Simple markdown parser (bold, italic, inline code) ───────────────────────
function parseMarkdown(text) {
  return text
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>")
    .replace(/\*(.+?)\*/g,"<em>$1</em>")
    .replace(/`(.+?)`/g,"<code>$1</code>")
    .replace(/\n/g,"<br>");
}

// ─── Core send + retry logic ───────────────────────────────────────────────────
async function callGateway(role, messages, attempt = 1) {
  const res = await fetch(GATEWAY_URL, {
    method:  "POST",
    headers: { "Content-Type": "application/json" },
    body:    JSON.stringify({ role, messages }),
  });

  let data;
  try   { data = await res.json(); }
  catch { data = { error: `Gateway returned a non-JSON response (HTTP ${res.status}).` }; }

  // If the gateway itself reports a transient Gemini 503/429, retry from client too
  if (
    data?.error &&
    (data.error.includes("503") || data.error.includes("429") ||
     data.error.toLowerCase().includes("high demand")) &&
    attempt <= CLIENT_MAX_TRIES
  ) {
    await new Promise(r => setTimeout(r, CLIENT_DELAY_MS * attempt));
    return callGateway(role, messages, attempt + 1);
  }

  return data;
}

async function dispatchMessage(text) {
  lastUserText = text;
  addMessage("user", text);
  chatHistory.push({ role: "user", content: text });

  setBusyState(true);
  const loadingId = addLoading();

  try {
    const data = await callGateway(currentRole, chatHistory);
    removeLoading(loadingId);

    if (data.reply) {
      addMessage("system", data.reply, roles[currentRole].badge);
      chatHistory.push({ role:"assistant", content: data.reply });
      setGatewayOnline();
      lastUserText = null;  // clear — success
    } else if (data.error) {
      addMessage("system", data.error, "System Notice", "error");
    } else {
      addMessage("system", "The gateway returned an empty response.", "System Notice", "error");
    }
  } catch {
    removeLoading(loadingId);
    setGatewayOffline();
    addMessage(
      "system",
      `The PAWS AI Gateway is not reachable at **${GATEWAY_URL}**.\n\nMake sure you have run **deno run -A demo_gateway.ts** in your terminal, then click Try Again.`,
      "Connection Offline",
      "error"
    );
  } finally {
    setBusyState(false);
    input.focus();
  }
}

// ─── Handle send ───────────────────────────────────────────────────────────────
async function handleSend() {
  const text = input.value.trim();
  if (!text || isSending) return;
  input.value = "";
  autoResize();
  await dispatchMessage(text);
}

sendBtn.addEventListener("click", handleSend);
input.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); handleSend(); }
});

// ─── Auto-resize textarea ──────────────────────────────────────────────────────
function autoResize() {
  input.style.height = "auto";
  input.style.height = Math.min(input.scrollHeight, 120) + "px";
}
input.addEventListener("input", autoResize);

// ─── Gateway health indicator ──────────────────────────────────────────────────
function setGatewayOnline() {
  gatewayStatus.textContent = "PAWS-Cloud — online";
  statusBar.querySelector("span:first-child").className = "dot-live";
}
function setGatewayOffline() {
  gatewayStatus.textContent = "PAWS-Cloud — offline";
  statusBar.querySelector("span:first-child").className = "dot-offline";
}

// Ping gateway on load
(async () => {
  try {
    await fetch(GATEWAY_URL, { method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ role:"citizen", messages:[] }),
      signal: AbortSignal.timeout(3000),
    });
    setGatewayOnline();
  } catch {
    gatewayStatus.textContent = "PAWS-Cloud — syncing…";
  }
})();

// ─── Boot ──────────────────────────────────────────────────────────────────────
renderIntro(currentRole);
</script>
</body>
</html>
