<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Verify PAWS-ID — National Registry</title>
  <link rel="stylesheet" href="../global.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; height: 100vh; padding: 20px; background: #020617; }
    .verify-wrap { width: 100%; max-width: 600px; text-align: center; }
    .input-box { margin-top: 32px; padding: 40px; }
    .input-box input { width: 100%; padding: 20px; background: rgba(255,255,255,0.03); border: 1px solid var(--card-border); border-radius: 16px; color: #fff; font-size: 1.5rem; text-align: center; font-family: inherit; margin-bottom: 24px; outline: none; }
    .input-box input:focus { border-color: var(--accent); }
    
    .result-card { margin-top: 32px; display: none; text-align: left; animation: slideUp 0.4s ease-out; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div class="verify-wrap">
    <div class="badge-glow" style="margin: 0 auto 16px;">Anti-Smuggling Registry</div>
    <h1>Verify a Candidate</h1>
    <p class="muted">Enter a PAWS Reference Number to verify its status, welfare history, and current academy standing.</p>

    <div class="glass-card input-box">
      <input type="text" placeholder="PAWS-26-00000" id="verify-input">
      <button class="btn-premium" style="width:100%;" onclick="verify()">VERIFY STATUS</button>
    </div>

    <div class="glass-card result-card" id="result">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h3 id="res-name">REX</h3>
        <span class="badge-glow" id="res-status">ACADEMY PASS</span>
      </div>
      <div style="font-size: 14px; color:var(--muted);">
        <p><strong>Microchip:</strong> <span id="res-chip">900123456789012</span></p>
        <p><strong>League:</strong> <span id="res-league">Tracking League</span></p>
        <p><strong>Welfare Audit:</strong> <span style="color:var(--accent);">PASS (SPCA Verified)</span></p>
      </div>
    </div>

    <a href="../start/" class="muted" style="display:block; margin-top:40px; text-decoration:none; font-size:14px;">← Back to Hub</a>
  </div>

  <script>
    function verify() {
      const input = document.getElementById('verify-input').value;
      if (input.length > 5) {
        document.getElementById('result').style.display = 'block';
      }
    }
  </script>
</body>
</html>
