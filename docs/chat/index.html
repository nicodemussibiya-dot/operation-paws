<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PAWS Assistant — AI Help</title>
  <link rel="stylesheet" href="../global.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; height: 100vh; padding: 20px; }
    .chat-wrap { width: 100%; max-width: 800px; height: 90vh; display: flex; flex-direction: column; gap: 16px; }
    .chat-card { flex: 1; display: flex; flex-direction: column; overflow: hidden; padding: 0; }
    
    #log { flex: 1; overflow-y: auto; padding: 32px; display: flex; flex-direction: column; gap: 16px; }
    .bubble { max-width: 85%; padding: 14px 20px; border-radius: 20px; font-size: 1rem; line-height: 1.5; animation: slideUp 0.3s ease-out; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .ai { align-self: flex-start; background: var(--glass); border: 1px solid var(--card-border); color: var(--text); border-bottom-left-radius: 4px; }
    .me { align-self: flex-end; background: var(--accent); color: #020617; font-weight: 600; border-bottom-right-radius: 4px; box-shadow: 0 4px 15px var(--accent-glow); }

    .input-area { padding: 24px; background: rgba(0,0,0,0.2); border-top: 1px solid var(--card-border); }
    .row { display: flex; gap: 12px; }
    .input { flex: 1; background: var(--glass); border: 1px solid var(--card-border); border-radius: 14px; padding: 14px 20px; color: #fff; outline: none; font-family: inherit; font-size: 1rem; }
    .input:focus { border-color: var(--accent); }
    
    .back-btn { display: flex; align-items: center; gap: 8px; color: var(--muted); text-decoration: none; font-weight: 600; font-size: 14px; }
    .back-btn:hover { color: #fff; }
  </style>
</head>
<body>
  <div class="chat-wrap">
    <header style="display:flex; justify-content:space-between; align-items:center;">
      <a href="../start/" class="back-btn">← Back to Hub</a>
      <div class="badge-glow">AI Support Active</div>
    </header>

    <main class="glass-card chat-card">
      <div id="log">
        <!-- Messages -->
      </div>
      <div class="input-area">
        <form id="form" class="row">
          <input type="text" id="msg" class="input" placeholder="Ask about PAWS (e.g. How to sponsor?)" autocomplete="off" required>
          <button type="submit" class="btn-premium">Send</button>
        </form>
      </div>
    </main>
    <p style="text-align:center; font-size:12px; color:var(--muted);">Informational AI only. No PII or tactical data processed here.</p>
  </div>

  <script src="app.js"></script>
</body>
</html>
