<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PAWS Assistant — Instant Help</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Premium Background Blobs -->
  <div class="background-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
  </div>

  <div class="wrap">
    <header class="top">
      <div class="logo">
        <span class="paws-icon">🐾</span>
        <h1>PAWS Assistant</h1>
      </div>
      <p class="muted">Instant FAQ & Routing. <br><small>Safety Note: Never share sensitive details (ID, address, microchips) here.</small></p>
    </header>

    <main class="chat-container">
      <div id="log" class="log">
        <!-- Messages appear here -->
      </div>

      <div class="input-area">
        <form id="form" class="row">
          <input type="text" id="msg" class="input" autocomplete="off" placeholder="Ask about PAWS (e.g. How to sponsor?)" required>
          <button type="submit" class="btn" id="send">
            <span>Send</span>
            <svg class="send-icon" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          </button>
        </form>
      </div>

      <div class="footer-note">
        <p class="muted small">
          Public-safe informational AI. For official intake, use WhatsApp from the <a href="../start/">hub</a>.
        </p>
      </div>
    </main>

    <nav class="bottom-nav">
      <a href="../start/" class="back-link">
        <svg class="back-icon" viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
        Back to Hub
      </a>
    </nav>
  </div>

  <script src="app.js"></script>
</body>
</html>
