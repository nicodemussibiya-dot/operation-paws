<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PAWS Assistant — Instant Help</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="chat-container">
    <header class="chat-header">
      <div class="header-content">
        <span class="paws-logo">🐾</span>
        <div class="title-wrap">
          <h1>PAWS Assistant</h1>
          <p class="subtitle">Instant FAQ & Routing.</p>
        </div>
      </div>
    </header>

    <div class="chat-warning">
      <strong>Safety Note:</strong> Never share sensitive details (ID, address, microchips) here.
    </div>

    <section class="chat-view">
      <div id="log" class="chat-log">
        <!-- Messages appear here -->
      </div>

      <div class="chat-input-area">
        <form id="form">
          <input type="text" id="msg" autocomplete="off" placeholder="Ask about PAWS (e.g. How to sponsor?)" required>
          <button type="submit" class="send-btn" id="send">
            <span class="btn-text">Send</span>
            <svg class="send-icon" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          </button>
        </form>
      </div>

      <div class="footer-note">
        <p class="muted small">
          Public-safe informational AI. For official intake, use WhatsApp from the <a href="../start/">hub</a>.
        </p>
      </div>
    </section>

    <nav class="bottom-nav">
      <a href="../start/" class="back-link">
        <svg class="back-icon" viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
        Back to Hub
      </a>
    </nav>
  </main>

  <script src="app.js"></script>
</body>
</html>
