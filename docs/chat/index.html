<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PAWS-OS — Central Command</title>
  <meta name="description" content="Operation PAWS tactical intelligence terminal." />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600&family=Outfit:wght@300;400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../global.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #020617;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      font-family: 'Outfit', sans-serif;
    }

    /* ── Shell ──────────────────────────────────────────── */
    .shell {
      width: 100%;
      max-width: 820px;
      height: 88vh;
      display: flex;
      flex-direction: column;
      background: rgba(2, 6, 23, 0.85);
      border: 1px solid rgba(16, 185, 129, 0.15);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 0 80px rgba(16, 185, 129, 0.06), 0 40px 80px rgba(0,0,0,0.6);
      backdrop-filter: blur(40px);
    }

    /* ── Title bar ──────────────────────────────────────── */
    .titlebar {
      padding: 16px 24px;
      background: rgba(255,255,255,0.02);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .dot { width: 12px; height: 12px; border-radius: 50%; }
    .dot.r { background: #ff5f57; }
    .dot.y { background: #febc2e; }
    .dot.g { background: #28c840; }
    .titlebar-text {
      flex: 1;
      text-align: center;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      font-family: 'JetBrains Mono', monospace;
    }
    .status-pill {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #10b981;
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.2);
      padding: 4px 12px;
      border-radius: 99px;
      animation: pulse 2.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.5; }
    }

    /* ── Messages ───────────────────────────────────────── */
    .chat-body {
      flex: 1;
      overflow-y: auto;
      padding: 32px 28px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }
    .chat-body::-webkit-scrollbar { width: 4px; }
    .chat-body::-webkit-scrollbar-track { background: transparent; }
    .chat-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 99px; }

    .message {
      max-width: 82%;
      padding: 14px 18px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.65;
      animation: fadeUp 0.3s ease-out;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message.ai {
      align-self: flex-start;
      background: rgba(16, 185, 129, 0.04);
      border: 1px solid rgba(16, 185, 129, 0.12);
      border-bottom-left-radius: 4px;
      color: #e2e8f0;
      font-family: 'JetBrains Mono', monospace;
      white-space: pre-wrap;
    }
    .message.user {
      align-self: flex-end;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      border-bottom-right-radius: 4px;
      color: #94a3b8;
    }

    /* Typing dots */
    .typing-dots { display: inline-flex; gap: 4px; align-items: center; }
    .typing-dots span {
      width: 6px; height: 6px; border-radius: 50%;
      background: #10b981;
      animation: blink 1.2s ease-in-out infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
      40%            { opacity: 1;   transform: scale(1); }
    }

    /* ── Input area ─────────────────────────────────────── */
    .input-area {
      padding: 20px 24px;
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex;
      gap: 12px;
      align-items: center;
      background: rgba(255,255,255,0.01);
      flex-shrink: 0;
    }
    .prompt-char {
      color: #10b981;
      font-family: 'JetBrains Mono', monospace;
      font-size: 18px;
      flex-shrink: 0;
    }
    .input-area input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #fff;
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      caret-color: #10b981;
    }
    .input-area input::placeholder { color: rgba(255,255,255,0.18); }
    .send-btn {
      background: rgba(16, 185, 129, 0.12);
      border: 1px solid rgba(16, 185, 129, 0.25);
      color: #10b981;
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 12px;
      letter-spacing: 1px;
      cursor: pointer;
      font-family: 'JetBrains Mono', monospace;
      text-transform: uppercase;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .send-btn:hover {
      background: rgba(16, 185, 129, 0.25);
      transform: translateY(-1px);
    }

    /* Suggestion chips */
    .chips {
      padding: 0 24px 16px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    .chip {
      padding: 6px 14px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 99px;
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      cursor: pointer;
      transition: all 0.2s;
      background: rgba(255,255,255,0.02);
    }
    .chip:hover {
      border-color: rgba(16,185,129,0.4);
      color: #10b981;
      background: rgba(16, 185, 129, 0.06);
    }

    a { color: #10b981; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="shell">

    <div class="titlebar">
      <div class="dot r"></div>
      <div class="dot y"></div>
      <div class="dot g"></div>
      <span class="titlebar-text">paws-os — tactical intelligence</span>
      <span class="status-pill">online</span>
    </div>

    <main class="chat-body" id="chat-box"></main>

    <div class="chips" id="chips">
      <span class="chip" onclick="quickSend('I am the National Commissioner')">Commissioner</span>
      <span class="chip" onclick="quickSend('I am a church elder')">Church Elder</span>
      <span class="chip" onclick="quickSend('I am a corporate partner')">Partner</span>
      <span class="chip" onclick="quickSend('I am a field officer')">Officer</span>
      <span class="chip" onclick="quickSend('Tell me about the security')">Security</span>
      <span class="chip" onclick="quickSend('How does the Breeder League work?')">League Rules</span>
    </div>

    <div class="input-area">
      <span class="prompt-char">›</span>
      <input id="user-input" type="text" placeholder="Ask anything..." autocomplete="off" />
      <button class="send-btn" onclick="sendMessage()">Send</button>
    </div>

  </div>

  <script src="../config.js"></script>
  <script src="app.js"></script>
  <script>
    function quickSend(text) {
      document.getElementById('user-input').value = text;
      sendMessage();
    }
  </script>
</body>
</html>
