<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PAWS-OS — Central Command Terminal</title>
  <link rel="stylesheet" href="../global.css">
  <style>
    body { background: #020617; padding: 20px; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .terminal-wrap { width: 100%; max-width: 900px; height: 80vh; display: flex; flex-direction: column; border: 1px solid var(--card-border); border-radius: 24px; overflow: hidden; background: rgba(0,0,0,0.5); backdrop-filter: blur(40px); }
    
    .terminal-header { padding: 20px 30px; border-bottom: 1px solid var(--card-border); display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.02); }
    .terminal-header h1 { font-size: 14px; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); }
    
    .chat-body { flex: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; gap: 24px; font-family: 'Courier New', Courier, monospace; }
    .message { max-width: 80%; padding: 16px 20px; border-radius: 12px; font-size: 14px; line-height: 1.5; }
    .message.ai { background: rgba(16, 185, 129, 0.05); color: #fff; border-left: 3px solid var(--accent); align-self: flex-start; }
    .message.user { background: rgba(255,255,255,0.05); color: var(--muted); align-self: flex-end; }
    
    .terminal-input-area { padding: 30px; border-top: 1px solid var(--card-border); display: flex; gap: 12px; }
    input { flex: 1; background: rgba(0,0,0,0.3); border: 1px solid var(--card-border); padding: 16px; border-radius: 12px; color: #fff; font-family: inherit; }
  </style>
</head>
<body>
  <div class="terminal-wrap hologram-border">
    <header class="terminal-header">
      <h1>PAWS-OS // Central Tactical Intelligence</h1>
      <div class="badge-glow" style="margin:0;">SYSTEM ONLINE</div>
    </header>
    
    <main class="chat-body" id="chat-box">
      <div class="message ai">
        [BOOT SEQUENCE COMPLETE]<br>
        Welcome to Operation PAWS Central Command.<br><br>
        How can I assist you today, Commissioner? I have full access to the national registry, breeder rivalry data, and the R12.8M escrow funds.
      </div>
    </main>
    
    <footer class="terminal-input-area">
      <input type="text" id="user-input" placeholder="Type a command or question (e.g. 'Status of Rex' or 'Explain to Elder')..." onkeydown="if(event.key==='Enter') sendMessage()">
      <button class="btn-premium" onclick="sendMessage()">EXECUTE</button>
    </footer>
  </div>

  <script src="../config.js"></script>
  <script src="app.js"></script>
</body>
</html>
