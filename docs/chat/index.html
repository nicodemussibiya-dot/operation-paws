<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PAWS Assistant — AI Help</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #030712;
      --card: rgba(15, 23, 42, 0.7);
      --card-border: rgba(255, 255, 255, 0.08);
      --text: #f8fafc;
      --muted: #94a3b8;
      --accent: #10b981;
      --accent-glow: rgba(16, 185, 129, 0.3);
      --glass: rgba(255, 255, 255, 0.02);
      --font: 'Outfit', system-ui, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: var(--font); 
      background: var(--bg); 
      color: var(--text); 
      height: 100vh; 
      display: flex; 
      align-items: center; 
      justify-content: center;
      background-image: radial-gradient(circle at 0% 0%, rgba(16, 185, 129, 0.1) 0%, transparent 40%);
      padding: 20px;
    }
    .chat-wrap { width: 100%; max-width: 850px; height: 92vh; display: flex; flex-direction: column; gap: 20px; animation: fadeIn 0.5s ease-out; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    
    .chat-card { 
      flex: 1; 
      background: var(--card);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border: 1px solid var(--card-border);
      border-radius: 32px;
      display: flex; 
      flex-direction: column; 
      overflow: hidden; 
      box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.6);
    }
    
    #log { flex: 1; overflow-y: auto; padding: 40px; display: flex; flex-direction: column; gap: 20px; scrollbar-width: none; }
    #log::-webkit-scrollbar { display: none; }
    
    .bubble { max-width: 80%; padding: 16px 24px; border-radius: 24px; font-size: 1.05rem; line-height: 1.6; animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    
    .ai { align-self: flex-start; background: var(--glass); border: 1px solid var(--card-border); color: var(--text); border-bottom-left-radius: 6px; }
    .me { align-self: flex-end; background: var(--accent); color: #020617; font-weight: 700; border-bottom-right-radius: 6px; box-shadow: 0 10px 30px var(--accent-glow); }

    .input-area { padding: 30px; background: rgba(0,0,0,0.3); border-top: 1px solid var(--card-border); }
    .row { display: flex; gap: 16px; }
    .input { 
      flex: 1; 
      background: rgba(255,255,255,0.03); 
      border: 1px solid var(--card-border); 
      border-radius: 16px; 
      padding: 16px 24px; 
      color: #fff; 
      outline: none; 
      font-family: inherit; 
      font-size: 1.1rem;
      transition: all 0.3s ease;
    }
    .input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-glow); background: rgba(255,255,255,0.05); }
    
    .btn { background: var(--accent); color: #020617; border: none; border-radius: 16px; padding: 0 32px; font-weight: 800; cursor: pointer; transition: all 0.2s; }
    .btn:hover { transform: translateY(-2px); background: #34d399; }
    
    .header-info { display: flex; justify-content: space-between; align-items: center; }
    .back-btn { color: var(--muted); text-decoration: none; font-weight: 600; font-size: 14px; transition: color 0.2s; }
    .back-btn:hover { color: #fff; }
    .status-badge { padding: 6px 14px; background: rgba(16, 185, 129, 0.1); color: var(--accent); border: 1px solid rgba(16, 185, 129, 0.2); border-radius: 99px; font-size: 12px; font-weight: 800; letter-spacing: 1px; }
  </style>
</head>
<body>
  <div class="chat-wrap">
    <header class="header-info">
      <a href="../start/" class="back-btn">← RETURN TO HUB</a>
      <div class="status-badge">AI ANALYTICS ACTIVE</div>
    </header>

    <main class="chat-card">
      <div id="log">
        <div class="bubble ai">Hi! I'm the PAWS Assistant. PAWS stands for <strong>Partnership for Animal Work & Service</strong>. I can help with dog intake FAQs, sponsorship routing, or general project info. How can I help you today?</div>
      </div>
      <div class="input-area">
        <form id="form" class="row">
          <input type="text" id="msg" class="input" placeholder="Ask about PAWS (e.g. How to sponsor?)" autocomplete="off" required>
          <button type="submit" class="btn">SEND</button>
        </form>
      </div>
    </main>
    <p style="text-align:center; font-size:12px; color:var(--muted); letter-spacing: 1px;">ENCRYPTED CHANNEL • NO PII PROCESSING</p>
  </div>

  <script src="app.js"></script>
</body>
</html>
