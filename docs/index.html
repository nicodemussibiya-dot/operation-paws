<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Operation PAWS — Official Launchpad</title>
  <meta http-equiv="refresh" content="3; URL='./start/'" />
  <style>
    :root{--bg:#0b1220;--text:#e9eefc;--accent:#7af0c7;}
    body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:ui-sans-serif,system-ui,sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden;}
    .wrap{text-align:center;padding:20px;}
    .loader{width:48px;height:48px;border:3px solid var(--accent);border-bottom-color:transparent;border-radius:50%;display:inline-block;animation:rotation 1s linear infinite;margin-bottom:20px;}
    @keyframes rotation{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
    h1{font-size:24px;margin:0 0 8px;letter-spacing:-0.02em;}
    p{color:#a8b3d6;font-size:16px;margin:0;}
    a{color:var(--accent);text-decoration:none;font-weight:600;display:block;margin-top:20px;}
  </style>
</head>
<body>
  <div class="wrap">
    <span class="loader"></span>
    <h1>Operation PAWS</h1>
    <p>Loading the official hub...</p>
    <a href="./start/">Click here if not redirected</a>
  </div>
</body>
</html>
