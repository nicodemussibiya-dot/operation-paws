<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PAWS Field Intake — Secure Terminal</title>
  <link rel="stylesheet" href="../global.css">
  <style>
    body { background: #020617; padding: 20px; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .gate-wrap { width: 100%; max-width: 450px; text-align: center; }
    .pin-input { font-size: 3rem; text-align: center; width: 100%; background: none; border: none; border-bottom: 2px solid var(--accent); color: #fff; outline: none; margin: 30px 0; letter-spacing: 1rem; }
    
    #app-ui { display: none; width: 100%; max-width: 600px; animation: fadeIn 0.5s ease-out; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .form-group { margin-bottom: 20px; text-align: left; }
    label { display: block; margin-bottom: 8px; color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
    input, select { width: 100%; padding: 16px; background: rgba(255,255,255,0.03); border: 1px solid var(--card-border); border-radius: 12px; color: #fff; font-family: inherit; font-size: 1rem; outline: none; }
    input:focus { border-color: var(--accent); }

    .recent-list { margin-top: 40px; text-align: left; }
    .recent-item { padding: 12px; background: rgba(255,255,255,0.02); border-radius: 8px; margin-bottom: 8px; font-size: 14px; display: flex; justify-content: space-between; }

    /* Success Overlay */
    .success-gate { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #020617; z-index: 100; align-items: center; justify-content: center; flex-direction: column; text-align: center; }
    .success-gate h2 { font-size: 3rem; color: var(--accent); margin-top: 20px; }
    .receipt { margin-top: 30px; padding: 30px; background: rgba(255,255,255,0.02); border: 1px solid var(--card-border); border-radius: 20px; width: 300px; font-family: monospace; }
  </style>
</head>
<body>

  <!-- 1. PIN GATE -->
  <div class="gate-wrap" id="pin-gate">
    <div class="badge-glow" style="margin: 0 auto;">Authorized Personnel Only</div>
    <h1 style="margin-top:20px;">Field Terminal</h1>
    <input type="password" maxlength="4" class="pin-input" id="pin" placeholder="••••">
    <p class="muted">Enter 4-Digit Security PIN</p>
    <button class="btn-premium" style="width:100%; margin-top:20px;" onclick="checkPin()">Access System</button>
  </div>

  <!-- 2. MAIN APP UI -->
  <main id="app-ui">
    <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom:40px;">
      <h2>Dog Intake Form</h2>
      <div class="badge-glow" style="color:var(--accent);">SECURE: NODE-042</div>
    </header>

    <form id="intake-form" onsubmit="submitForm(event)">
      <div class="form-group">
        <label>Microchip Number (15 Digits)</label>
        <input type="text" pattern="\d{15}" required placeholder="900XXXXXXXXXXXX">
      </div>
      <div class="form-group">
        <label>Dog Name / Reference</label>
        <input type="text" required placeholder="e.g. Max">
      </div>
      <div class="form-group">
        <label>Primary Breed</label>
        <select required>
          <option value="">Select Breed...</option>
          <option>German Shepherd</option>
          <option>Rottweiler</option>
          <option>Labrador</option>
          <option>Border Collie</option>
          <option>Malinois</option>
          <option>Golden Retriever</option>
          <option>Belgium Shepherd</option>
        </select>
      </div>
      <div class="form-group">
        <label>Source Tier</label>
        <select required>
          <option value="3">Tier 3 (Public Donation)</option>
          <option value="2">Tier 2 (Professional Breeder)</option>
          <option value="1">Tier 1 (International Strategic)</option>
        </select>
      </div>
      <button type="submit" class="btn-premium" style="width:100%; padding:20px; font-size:1.2rem;">REGISTER CANDIDATE</button>
    </form>

    <section class="recent-list">
      <label>Recently Registered</label>
      <div class="recent-item"><span>Rex (PAWS-26-00402)</span> <span style="color:var(--accent);">PASS</span></div>
      <div class="recent-item"><span>Bella (PAWS-26-00403)</span> <span style="color:var(--muted);">PENDING</span></div>
    </section>
  </main>

  <!-- 3. SUCCESS GATE -->
  <div class="success-gate" id="success-gate">
    <div style="font-size: 80px;">✅</div>
    <h2>Candidate Secured</h2>
    <div class="receipt" id="receipt-data">
      <div style="border-bottom: 1px dashed #444; padding-bottom: 10px; margin-bottom: 10px;">NATIONAL REGISTRY RECEIPT</div>
      <div id="receipt-paws-id">PAWS-26-XXXXX</div>
      <div style="font-size: 10px; color:#666; margin-top:10px;">TIMESTAMP: JUST NOW</div>
    </div>
    <button class="btn-premium" style="margin-top:40px;" onclick="window.location.reload()">NEXT INTAKE</button>
  </div>

  <script>
    function checkPin() {
      const pin = document.getElementById('pin').value;
      if (pin === '2499' || pin === '10111') {
        document.getElementById('pin-gate').style.display = 'none';
        document.getElementById('app-ui').style.display = 'block';
      } else {
        alert('ACCESS DENIED');
      }
    }

    function submitForm(e) {
      e.preventDefault();
      const id = "PAWS-26-" + Math.floor(1000 + Math.random() * 9000);
      document.getElementById('receipt-paws-id').innerText = id;
      document.getElementById('app-ui').style.display = 'none';
      document.getElementById('success-gate').style.display = 'flex';
    }
  </script>
</body>
</html>
