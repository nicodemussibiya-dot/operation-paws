<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PAWS Admin — Field Intake</title>
  <style>
    :root{--bg:#f8fafc;--card:#ffffff;--text:#1e293b;--accent:#0f172a;--success:#22c55e;--warn:#f59e0b;}
    body{margin:0;font-family:ui-sans-serif,system-ui,sans-serif;background:var(--bg);color:var(--text);display:flex;justify-content:center;padding:20px;}
    .app{width:100%;max-width:400px;}
    header{margin-bottom:24px;text-align:center;}
    .badge{display:inline-block;padding:4px 12px;background:var(--accent);color:#fff;border-radius:99px;font-size:12px;font-weight:700;margin-bottom:8px;}
    h1{font-size:24px;margin:0;letter-spacing:-0.03em;}
    
    .card{background:var(--card);padding:24px;border-radius:20px;box-shadow:0 10px 15px -3px rgba(0,0,0,0.1);border:1px solid #e2e8f0;}
    .field{margin-bottom:18px;}
    label{display:block;font-size:14px;font-weight:600;margin-bottom:6px;color:#64748b;}
    input, select{width:100%;padding:14px;border-radius:12px;border:2px solid #e2e8f0;font-size:16px;box-sizing:border-box;outline:none;transition:border-color 0.2s;}
    input:focus{border-color:var(--accent);}
    
    .btn{width:100%;padding:16px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-size:18px;font-weight:700;cursor:pointer;margin-top:10px;transition:transform 0.1s;}
    .btn:active{transform:scale(0.98);}
    
    #result{margin-top:20px;padding:16px;border-radius:12px;display:none;text-align:center;}
    .success{background:#dcfce7;color:#166534;border:1px solid #bbf7d0;display:block !important;}
    .error{background:#fee2e2;color:#991b1b;border:1px solid #fecaca;display:block !important;}
    
    .paws-id{font-size:24px;font-weight:800;display:block;margin-top:8px;letter-spacing:1px;}
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="badge">Operation PAWS Admin</div>
      <h1>Field Intake</h1>
    </header>

    <div id="gate" class="card">
      <div class="field">
        <label>Enter Admin PIN</label>
        <input type="password" id="pin" placeholder="••••" maxlength="4" inputmode="numeric">
      </div>
      <button class="btn" onclick="checkPin()">Unlock Form</button>
    </div>

    <div id="form-wrap" class="card" style="display:none;">
      <form id="intakeForm">
        <div class="field">
          <label>Dog Name</label>
          <input type="text" id="dog_name" required placeholder="e.g. Rex">
        </div>
        <div class="field">
          <label>Breed</label>
          <input type="text" id="breed" required placeholder="e.g. German Shepherd">
        </div>
        <div class="field">
          <label>Microchip ID (15 Digits)</label>
          <input type="text" id="microchip" required pattern="\d{15}" title="Exactly 15 digits" placeholder="900000000000000">
        </div>
        <div class="field">
          <label>Intake Tier</label>
          <select id="source_tier">
            <option value="2">Tier 2: Public Donation</option>
            <option value="1">Tier 1: Breeder Sourced</option>
            <option value="3">Tier 3: Academy Lead</option>
          </select>
        </div>
        <button type="submit" class="btn">Register Dog</button>
      </form>
    </div>

    <div id="result"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
